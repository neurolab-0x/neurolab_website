# ──────────────────────────────────────────────
# Decap CMS Configuration — Neurolab Website
# ──────────────────────────────────────────────

# For local dev: run `npx decap-server` alongside `npm run dev`
# For production: configure git-gateway or github backend
local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # ── Blog Posts ──
  - name: "blogs"
    label: "Blog Posts"
    folder: "src/content/blogs"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Slug", name: "slug", widget: "string", pattern: ["^[a-z0-9-]+$", "Lowercase letters, numbers, and hyphens only"] }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["Engineering", "Clinical", "Research", "Product", "Company"] }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. Feb 20, 2026" }
      - { label: "Read Time", name: "readTime", widget: "string", hint: "e.g. 12 min read" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false, hint: "Used on the blog list cards" }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false, hint: "Used at the top of the blog detail page" }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  # ── Career Departments ──
  - name: "careers"
    label: "Career Departments"
    folder: "src/content/careers"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Index", name: "index", widget: "string", hint: "e.g. 01, 02" }
      - { label: "Department Name", name: "name", widget: "string" }
      - { label: "Disciplines", name: "disciplines", widget: "string", hint: "e.g. Hardware · Signal Processing" }
      - label: "Roles"
        name: "roles"
        widget: "list"
        fields:
          - { label: "Slug", name: "slug", widget: "string" }
          - { label: "Job Title", name: "title", widget: "string" }
          - { label: "Location", name: "location", widget: "select", options: ["Remote", "San Francisco, CA", "Boston, MA", "Washington, DC", "Zürich, CH"] }
          - { label: "Level", name: "level", widget: "select", options: ["Senior", "Lead", "Staff", "Principal", "Director"] }
          - { label: "Commitment", name: "commitment", widget: "select", options: ["Full-time"], default: "Full-time" }
          - { label: "About", name: "about", widget: "text" }
          - { label: "Responsibilities", name: "responsibilities", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Requirements", name: "requirements", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Nice to Have", name: "niceToHave", widget: "list", field: { label: "Item", name: "item", widget: "string" } }

  # ── Products ──
  - name: "products"
    label: "Product Configurations"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - label: "Editions"
        name: "editions"
        widget: "list"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Price (USD)", name: "price", widget: "number", value_type: "int" }
          - { label: "Description", name: "desc", widget: "text" }
      - label: "Sensors"
        name: "sensors"
        widget: "list"
        fields:
          - { label: "Channel Count", name: "value", widget: "number", value_type: "int" }
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Price Offset (USD)", name: "priceOffset", widget: "number", value_type: "int" }
          - { label: "Description", name: "desc", widget: "text" }
      - label: "Storage Options"
        name: "storage"
        widget: "list"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Price Offset (USD)", name: "priceOffset", widget: "number", value_type: "int" }
          - { label: "Description", name: "desc", widget: "text" }

  # ── Partners ──
  - name: "partners"
    label: "Partners"
    files:
      - label: "Partners Data"
        name: "data"
        file: "src/content/partners/data.json"
        fields:
          - label: "Partners List"
            name: "partners"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Logo Image", name: "logo", widget: "image", required: false, hint: "Upload a real logo (optional). Leave blank to use domain/icon fallback." }
              - { label: "Domain", name: "domain", widget: "string", hint: "Used to fetch the clearbit logo, e.g. nvidia.com", required: false }
              - { label: "Icon Name (Fallback)", name: "icon", widget: "string", hint: "Lucide icon name if no domain logo, e.g. Cpu", required: false }
