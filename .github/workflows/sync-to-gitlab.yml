name: Sync to GitLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab (Lab)
        env:
          GITLAB_REPO: ${{ secrets.GITLAB_LAB_REPO_URL || 'git@gitlab.com:neurolab.inc/neurolab_webapp' }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_LAB_TOKEN || secrets.GITLAB_TOKEN }}
        run: |
          if [[ -z "$GITLAB_REPO" || -z "$GITLAB_TOKEN" ]]; then
            echo "Error: Missing Lab GitLab secrets. Please ensure GITLAB_REPO and GITLAB_TOKEN are set."
            exit 1
          fi

          # Clean up repo URL for oauth2 format
          # Removes both 'https://' if present and 'git@' or ':' prefix stuff for SSH.
          # Expected target: gitlab.com/path/to/repo.git
          CLEAN_REPO=${GITLAB_REPO#https://}
          CLEAN_REPO=${CLEAN_REPO#git@}
          CLEAN_REPO=${CLEAN_REPO/:/\/}
          CLEAN_REPO=${CLEAN_REPO%.git}.git # Always ends in .git

          AUTH_URL="https://oauth2:${GITLAB_TOKEN}@${CLEAN_REPO}"
          git remote add lab "$AUTH_URL" || git remote set-url lab "$AUTH_URL"
          
          # Try standard push first, fallback to force if needed
          git push lab main:main || git push lab main:main --force

      - name: Mirror to GitLab (Hub)
        env:
          GITLAB_REPO: ${{ secrets.GITLAB_HUB_REPO_URL || 'git@gitlab.com:neurolab.inc/neurolab_webapp' }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_HUB_TOKEN || secrets.GITLAB_TOKEN }}
        run: |
          if [[ -z "$GITLAB_REPO" || -z "$GITLAB_TOKEN" ]]; then
            echo "Error: Missing Hub GitLab secrets. Please ensure GITLAB_REPO and GITLAB_TOKEN are set."
            exit 1
          fi

          # Clean up repo URL for oauth2 format
          CLEAN_REPO=${GITLAB_REPO#https://}
          CLEAN_REPO=${CLEAN_REPO#git@}
          CLEAN_REPO=${CLEAN_REPO/:/\/}
          CLEAN_REPO=${CLEAN_REPO%.git}.git # Always ends in .git

          AUTH_URL="https://oauth2:${GITLAB_TOKEN}@${CLEAN_REPO}"
          git remote add hub "$AUTH_URL" || git remote set-url hub "$AUTH_URL"
          
          # Try standard push first, fallback to force if needed
          git push hub main:main || git push hub main:main --force
